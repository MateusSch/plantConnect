<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data</title>
  <style>
    body { overflow: hidden; }
  </style>
  <script>
    const size = new URLSearchParams(window.location.search).get('size');
    if (size) document.documentElement.style.setProperty('--font-size', parseFloat(size) + 'px');
  </script>
</head>
<body>
  <date-component></date-component>

  <script type="module">
    import { LitElement, html, css } from 'https://cdn.jsdelivr.net/gh/lit/dist@2/all/lit-all.min.js';

    class DateComponent extends LitElement {
      static properties = {
        currentTime: { type: Number }
      };

      static styles = css`
        .date-timer {
          font-size: var(--font-size, 30px);
          font-weight: bold;
          color: white;
          border-radius: 10px;
          padding: 20px;
          font-family: 'NouvelR', 'Arial', sans-serif;
        }
      `;

      constructor() {
        super();
        this.currentTime = Date.now();
        this._timerId = null;
      }

      connectedCallback() {
        super.connectedCallback();
        this._timerId = setInterval(() => {
          this.currentTime = Date.now();
        }, 60000);
      }

      disconnectedCallback() {
        super.disconnectedCallback();
        clearInterval(this._timerId);
      }

      render() {
        return html`
          <div class="date-timer">
            <span>${new Intl.DateTimeFormat('pt-BR', {
              day: '2-digit',
              month: '2-digit',
              year: 'numeric',
              timeZone: 'America/Sao_Paulo',
            }).format(this.currentTime)}</span>
          </div>
        `;
      }
    }

    customElements.define('date-component', DateComponent);
  </script>
</body>
</html>
